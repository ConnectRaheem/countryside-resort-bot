<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countryside Resort - Chat</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --forest: #1a2e1a;
      --moss: #2d4a2d;
      --sage: #7a9e6e;
      --cream: #f5f0e8;
      --sand: #e8dcc8;
      --gold: #c9a84c;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --white: #ffffff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1a2e1a 0%, #2d4a2d 100%);
      min-height: 100vh;
    }

    .demo-text {
      color: rgba(245, 240, 232, 0.25);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── Bubble ── */
    #chat-bubble {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #2d4a2d, #1a2e1a);
      border-radius: 50%;
      border: 2px solid #c9a84c;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      z-index: 9999;
      transition: transform 0.2s ease;
    }

    #chat-bubble:hover {
      transform: scale(1.08);
    }

    .icon-chat {
      display: block;
    }

    .icon-close {
      display: none;
    }

    #chat-bubble.open .icon-chat {
      display: none;
    }

    #chat-bubble.open .icon-close {
      display: block;
    }

    .notif {
      position: absolute;
      top: -3px;
      right: -3px;
      width: 16px;
      height: 16px;
      background: #e74c3c;
      border-radius: 50%;
      border: 2px solid #1a2e1a;
      font-size: 0.6rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    /* ── Window ── */
    #chat-window {
      position: fixed;
      bottom: 100px;
      right: 28px;
      width: 370px;
      height: 540px;
      background: #f5f0e8;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(201, 168, 76, 0.2);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 9998;
    }

    #chat-window.open {
      display: flex;
    }

    /* ── Header ── */
    .chat-header {
      background: linear-gradient(135deg, #1a2e1a, #2d4a2d);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c9a84c, #e8c05a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a2e1a;
      flex-shrink: 0;
    }

    .header-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 600;
      color: #f5f0e8;
    }

    .header-sub {
      font-size: 0.7rem;
      color: #7a9e6e;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #5cb85c;
      margin-left: auto;
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(92, 184, 92, 0.7);
    }

    /* ── Messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-messages::-webkit-scrollbar {
      width: 3px;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #e8dcc8;
      border-radius: 3px;
    }

    .welcome-card {
      background: linear-gradient(135deg, #1a2e1a, #2d4a2d);
      border-radius: 12px;
      padding: 14px;
      border: 1px solid rgba(201, 168, 76, 0.2);
    }

    .welcome-card .resort-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 5px;
    }

    .welcome-card p {
      font-size: 0.8rem;
      color: rgba(245, 240, 232, 0.8);
      line-height: 1.5;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      background: white;
      border: 1px solid rgba(122, 158, 110, 0.4);
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 0.7rem;
      color: #2d4a2d;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .chip:hover {
      background: #2d4a2d;
      color: #f5f0e8;
    }

    .message {
      display: flex;
      gap: 8px;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .msg-av {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
      margin-top: 2px;
    }

    .message.bot .msg-av {
      background: linear-gradient(135deg, #c9a84c, #e8c05a);
      color: #1a2e1a;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
    }

    .message.user .msg-av {
      background: #e8dcc8;
      color: #6b6b6b;
    }

    .msg-bubble {
      max-width: 80%;
      padding: 9px 13px;
      border-radius: 12px;
      font-size: 0.8rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.bot .msg-bubble {
      background: white;
      color: #1a1a1a;
      border-radius: 3px 12px 12px 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
    }

    .message.user .msg-bubble {
      background: linear-gradient(135deg, #2d4a2d, #1a2e1a);
      color: #f5f0e8;
      border-radius: 12px 3px 12px 12px;
    }

    .typing {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .typing-dots {
      background: white;
      border-radius: 3px 12px 12px 12px;
      padding: 10px 14px;
      display: flex;
      gap: 4px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #7a9e6e;
      animation: bounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
      }

      30% {
        transform: translateY(-5px);
      }
    }

    /* ── Input ── */
    .chat-input-area {
      padding: 12px 14px;
      background: white;
      border-top: 1px solid rgba(0, 0, 0, 0.07);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      border: 1.5px solid #e8dcc8;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 0.8rem;
      font-family: 'DM Sans', sans-serif;
      color: #1a1a1a;
      background: #f5f0e8;
      resize: none;
      outline: none;
      max-height: 80px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    #chat-input:focus {
      border-color: #7a9e6e;
    }

    #chat-input::placeholder {
      color: #6b6b6b;
    }

    #send-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, #2d4a2d, #1a2e1a);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.2s, opacity 0.2s;
    }

    #send-btn:hover {
      transform: scale(1.06);
    }

    #send-btn:active {
      transform: scale(0.94);
    }

    #send-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .chat-footer {
      padding: 6px;
      background: white;
      text-align: center;
      font-size: 0.62rem;
      color: #6b6b6b;
      border-top: 1px solid rgba(0, 0, 0, 0.04);
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      #chat-window {
        width: calc(100vw - 20px);
        right: 10px;
      }

      #chat-bubble {
        bottom: 16px;
        right: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="demo-text">Countryside Resort Gilgit</div>

  <!-- Bubble -->
  <div id="chat-bubble">
    <div class="notif" id="notif">1</div>
    <svg class="icon-chat" width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#f5f0e8" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="9" cy="10" r="1" fill="#c9a84c" />
      <circle cx="12" cy="10" r="1" fill="#c9a84c" />
      <circle cx="15" cy="10" r="1" fill="#c9a84c" />
    </svg>
    <svg class="icon-close" width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M18 6L6 18M6 6l12 12" stroke="#f5f0e8" stroke-width="2" stroke-linecap="round" />
    </svg>
  </div>

  <!-- Window -->
  <div id="chat-window">
    <div class="chat-header">
      <div class="avatar">A</div>
      <div>
        <div class="header-name">Ali — Resort Assistant</div>
        <div class="header-sub">Countryside Resort Gilgit</div>
      </div>
      <div class="status"></div>
    </div>

    <div class="chat-messages" id="messages">
      <div class="welcome-card">
        <div class="resort-name">Countryside Resort Gilgit</div>
        <p>Welcome! I'm Ali. Ask me about rooms, prices, activities, or local attractions in Gilgit-Baltistan.</p>
      </div>
      <div class="suggestions">
        <div class="chip" onclick="suggest('What room types do you have?')">Room types</div>
        <div class="chip" onclick="suggest('What are your prices?')">Prices</div>
        <div class="chip" onclick="suggest('What attractions are near Gilgit?')">Attractions</div>
        <div class="chip" onclick="suggest('How can I book a room?')">Book now</div>
        <div class="chip" onclick="suggest('What activities do you offer?')">Activities</div>
      </div>
    </div>

    <div class="chat-input-area">
      <textarea id="chat-input" placeholder="Ask me anything..." rows="1" onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="#f5f0e8" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>
    </div>
    <div class="chat-footer">Powered by AI · Countryside Resort Gilgit</div>
  </div>

  <script>
    const API_URL = "http://localhost:8000/chat";
    const THREAD_ID = "guest-" + Math.random().toString(36).substr(2, 9);
    let isLoading = false;
    let isOpen = false;

    // Toggle
    document.getElementById("chat-bubble").addEventListener("click", function () {
      isOpen = !isOpen;
      this.classList.toggle("open", isOpen);
      document.getElementById("chat-window").classList.toggle("open", isOpen);
      const n = document.getElementById("notif");
      if (n) n.remove();
      if (isOpen) setTimeout(() => document.getElementById("chat-input").focus(), 100);
    });

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 80) + "px";
    }

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function addMessage(text, role) {
      const box = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "message " + role;
      const av = role === "bot" ? "A" : "G";
      // render line breaks properly
      const formatted = text.replace(/\n/g, "<br>");
      div.innerHTML = `<div class="msg-av">${av}</div><div class="msg-bubble">${formatted}</div>`;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function showTyping() {
      const box = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "message bot typing";
      div.id = "typing";
      div.innerHTML = `<div class="msg-av">A</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById("typing");
      if (t) t.remove();
    }

    async function sendMessage() {
      const input = document.getElementById("chat-input");
      const q = input.value.trim();
      if (!q || isLoading) return;
      input.value = "";
      input.style.height = "auto";
      isLoading = true;
      document.getElementById("send-btn").disabled = true;
      addMessage(q, "user");
      showTyping();
      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q, thread_id: THREAD_ID })
        });
        const data = await res.json();
        removeTyping();
        addMessage(data.answer, "bot");
      } catch (e) {
        removeTyping();
        addMessage("Sorry, I can't connect right now. Please try again shortly.", "bot");
      }
      isLoading = false;
      document.getElementById("send-btn").disabled = false;
      document.getElementById("chat-input").focus();
    }

    function suggest(text) {
      document.getElementById("chat-input").value = text;
      sendMessage();
    }
  </script>
</body>

</html>
